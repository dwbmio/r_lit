services:
  pgpour:
    build:
      context: .
      args:
        # 取消注释启用 OTel 指标导出
        # CARGO_FEATURES: metric
    image: pgpour:latest
    container_name: pgpour
    restart: unless-stopped
    volumes:
      - ./config.yml:/etc/pgpour/config.yml:ro
    environment:
      CONFIG_PATH: /etc/pgpour/config.yml
      PG_PASSWORD: ${PG_PASSWORD}
      RUST_LOG: info
      # --- OTel (需要 CARGO_FEATURES=metric 构建) ---
      # OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    # scratch 镜像无系统工具，用 /pgpour --version 做存活探针
    healthcheck:
      test: ["CMD", "/pgpour", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
