# pgpour fan-out configuration example
#
# One replication slot, CDC events independently routed to different topics
# via per-target table filtering. All targets are peers — no "primary".
# Matching targets are produced to concurrently (latency = max, not sum).

postgres:
  host: starlink-dev-uc-internal.hs99.vip
  port: 5432
  database: lgh_blockblast_client
  username: solutionhub_dev
  # password: (use PG_PASSWORD env var)
  publication: cdc_publication

kafka:
  # Shared connection defaults — every target inherits these unless overridden.
  brokers: 10.9.169.2:9092,10.9.131.68:9092,10.9.103.246:9092
  security_protocol: plaintext

  # Independent routing targets.
  targets:
    # Only receives table1 events
    - name: primary
      topic_prefix: cdc
      tables:
        - public.table1

    # Receives ALL tables (no filter)
    - name: backup
      topic_prefix: cdc-backup

    # Only receives table2 events
    - name: analytics
      topic_prefix: analytics
      tables:
        - public.table2

    # Override brokers/auth for a different Kafka cluster
    - name: remote-cluster
      brokers: other-kafka:9092
      topic_prefix: remote
      security_protocol: sasl_ssl
      sasl_mechanism: scram-sha-512
      sasl_username: remote_user
      # sasl_password: (use env var)

pipeline:
  batch_max_fill_ms: 5000
  max_table_sync_workers: 4
