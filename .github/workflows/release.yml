name: Release

on:
  workflow_dispatch:
    inputs:
      projects:
        description: 'Space-separated project names to build (e.g. "bulk_upload img_resize")'
        required: true
        type: string
  repository_dispatch:
    types: [build]
  push:
    branches: [main]
    paths:
      - '*/Cargo.toml'
      - '.github/workflows/release.yml'
      - 'release-metadata.json'
      - 'scripts/install.sh.template'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  HFROG_API: https://hfrog.gamesci-lite.com
  GITHUB_REPO: dwbmio/r_lit
  R2_PUBLIC_DOMAIN: r2.gamesci-lite.com
  R2_KEY_PREFIX: r_lit

jobs:
  # ╔══════════════════════════════════════════════════════════════════╗
  # ║ Job 1 — Detect changed crates, merge with release-metadata.json  ║
  # ╚══════════════════════════════════════════════════════════════════╝
  detect:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.detect.outputs.projects }}
      matrix:   ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect & enrich projects
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          META=release-metadata.json
          [ -f "$META" ] || { echo "::error::missing $META"; exit 1; }

          DEFAULT_TARGETS=$(jq -c '.defaults.targets' "$META")
          DEFAULT_CATEGORY=$(jq -r '.defaults.category' "$META")
          DEFAULT_SOURCE_TYPE=$(jq -r '.defaults.source_type' "$META")

          declare -a CANDIDATES=()
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            for p in ${{ github.event.inputs.projects }}; do CANDIDATES+=("$p"); done
            echo "=== mode: workflow_dispatch (${#CANDIDATES[@]}) ==="
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            for p in $(echo '${{ toJson(github.event.client_payload) }}' | jq -r '.projects // empty'); do
              CANDIDATES+=("$p")
            done
            echo "=== mode: repository_dispatch (${#CANDIDATES[@]}) ==="
          else
            echo "=== mode: push (diff HEAD vs HEAD^) ==="
            while IFS= read -r tool; do CANDIDATES+=("$tool"); done < <(jq -r '.tools | keys[]' "$META")
          fi

          PROJECTS='[]'

          for name in "${CANDIDATES[@]}"; do
            cargo_toml="${name}/Cargo.toml"
            if [ ! -f "$cargo_toml" ]; then
              echo "  ✗ ${name}/Cargo.toml not found, skip"
              continue
            fi

            new_ver=$(grep '^version' "$cargo_toml" | head -1 | cut -d'"' -f2)

            # On push events we only ship version bumps.
            if [ "${{ github.event_name }}" = "push" ]; then
              old_ver=$(git show HEAD^:"$cargo_toml" 2>/dev/null \
                        | grep '^version' | head -1 | cut -d'"' -f2 || echo "")
              if [ "$new_ver" = "$old_ver" ]; then
                echo "  · ${name} v${new_ver} (unchanged)"
                continue
              fi
              echo "  Δ ${name} ${old_ver:-∅}→${new_ver}"
            fi

            if gh release view "${name}-v${new_ver}" --json tagName >/dev/null 2>&1; then
              echo "  ≡ ${name}-v${new_ver} already released, skip"
              continue
            fi

            tool_meta=$(jq --arg n "$name" '.tools[$n] // {}' "$META")
            description=$(echo "$tool_meta"  | jq -r --arg fb "r_lit/${name}" '.description // $fb')
            category=$(echo "$tool_meta"     | jq -r --arg fb "$DEFAULT_CATEGORY"    '.category    // $fb')
            source_type=$(echo "$tool_meta"  | jq -r --arg fb "$DEFAULT_SOURCE_TYPE" '.source_type // $fb')
            gui=$(echo "$tool_meta"          | jq -r '.gui // false')
            mac_app_name=$(echo "$tool_meta" | jq -r --arg fb "$name"                '.macos_app_name // $fb')
            targets=$(echo "$tool_meta"      | jq -c --argjson d "$DEFAULT_TARGETS"  '.targets // $d')

            entry=$(jq -nc \
              --arg n   "$name" \
              --arg v   "$new_ver" \
              --arg d   "$description" \
              --arg c   "$category" \
              --arg s   "$source_type" \
              --arg map "$mac_app_name" \
              --argjson g "$gui" \
              --argjson t "$targets" \
              '{name:$n, version:$v, description:$d, category:$c, source_type:$s,
                gui:$g, macos_app_name:$map, targets:$t}')
            PROJECTS=$(echo "$PROJECTS" | jq -c --argjson e "$entry" '. + [$e]')
            echo "  + ${name} v${new_ver} (cat=${category} gui=${gui} targets=$(echo "$targets"|jq -c .))"
          done

          COUNT=$(echo "$PROJECTS" | jq 'length')
          echo ""; echo "=== Result: ${COUNT} project(s) to build ==="
          echo "$PROJECTS" | jq .

          if [ "$COUNT" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo 'projects=[]'        >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "projects=$(echo "$PROJECTS" | jq -c)" >> "$GITHUB_OUTPUT"

          # Build matrix is the *union* of all targets across all projects, mapped to OS.
          MATRIX=$(echo "$PROJECTS" | jq -c '
            [.[].targets[]] | unique | map(
              if   . == "x86_64-unknown-linux-gnu"  then {os:"ubuntu-latest", target:.}
              elif . == "aarch64-apple-darwin"     then {os:"macos-latest",  target:.}
              elif . == "x86_64-apple-darwin"      then {os:"macos-13",      target:.}
              elif . == "x86_64-pc-windows-msvc"   then {os:"windows-latest",target:.}
              elif . == "aarch64-pc-windows-msvc"  then {os:"windows-latest",target:.}
              else null end
            ) | map(select(. != null)) | {include: .}
          ')
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  # ╔══════════════════════════════════════════════════════════════════╗
  # ║ Job 2 — Build per-target binaries                                ║
  # ╚══════════════════════════════════════════════════════════════════╝
  build:
    name: Build (${{ matrix.target }})
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev cmake pkg-config libcurl4-openssl-dev \
            libwayland-dev libxkbcommon-dev libudev-dev libx11-dev libxcursor-dev libxi-dev \
            libasound2-dev

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-all-crates: true

      # macOS-only: import the Developer ID cert into a transient keychain.
      # Skipped if MACOS_CERTIFICATE secret is not set; GUI builds will be
      # unsigned (still useful for PRs).
      - name: Import codesign identity (macOS)
        if: startsWith(matrix.os, 'macos')
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${MACOS_CERTIFICATE:-}" ]; then
            echo "::warning::MACOS_CERTIFICATE not set — GUI builds will be unsigned"
            echo "MACOS_SIGNED=0" >> "$GITHUB_ENV"
            exit 0
          fi
          KP="${KEYCHAIN_PASSWORD:-r_lit-temp-keychain-pwd}"
          KC="${RUNNER_TEMP}/build.keychain-db"
          security create-keychain -p "$KP" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KP" "$KC"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "${RUNNER_TEMP}/cert.p12"
          security import "${RUNNER_TEMP}/cert.p12" \
            -k "$KC" -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KP" "$KC"
          PRIOR=$(security list-keychains -d user | tr -d '" ' | tr '\n' ' ')
          security list-keychains -d user -s "$KC" $PRIOR
          rm -f "${RUNNER_TEMP}/cert.p12"
          echo "MACOS_SIGNED=1" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        env:
          PROJECTS: ${{ needs.detect.outputs.projects }}
        run: |
          set -euo pipefail
          for item in $(echo "$PROJECTS" | jq -c '.[]'); do
            NAME=$(echo "$item" | jq -r '.name')
            TARGETS=$(echo "$item" | jq -r '.targets[]')
            if ! echo "$TARGETS" | grep -qx "${{ matrix.target }}"; then
              echo "⤳ ${NAME} skipped (does not target ${{ matrix.target }})"
              continue
            fi
            echo "🔨 Building ${NAME} for ${{ matrix.target }}"
            (
              cd "$NAME"
              if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
                RUSTFLAGS='-C linker=cc -C link-args=-L/usr/lib/x86_64-linux-gnu' \
                  cargo build --release --target ${{ matrix.target }}
              else
                cargo build --release --target ${{ matrix.target }}
              fi
            )
          done

      - name: Package
        shell: bash
        env:
          PROJECTS: ${{ needs.detect.outputs.projects }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_PWD: ${{ secrets.MACOS_NOTARY_PWD }}
        run: |
          set -euo pipefail
          mkdir -p release

          for item in $(echo "$PROJECTS" | jq -c '.[]'); do
            NAME=$(echo "$item" | jq -r '.name')
            VERSION=$(echo "$item" | jq -r '.version')
            GUI=$(echo "$item" | jq -r '.gui')
            APP_NAME=$(echo "$item" | jq -r '.macos_app_name')
            TARGETS=$(echo "$item" | jq -r '.targets[]')

            if ! echo "$TARGETS" | grep -qx "${{ matrix.target }}"; then
              continue
            fi

            BIN_PATH="${NAME}/target/${{ matrix.target }}/release/${NAME}"
            BIN_PATH_EXE="${BIN_PATH}.exe"
            if [ ! -f "$BIN_PATH" ] && [ ! -f "$BIN_PATH_EXE" ]; then
              echo "⤳ ${NAME}: no binary for ${{ matrix.target }}, skip"
              continue
            fi

            # GUI on macOS → signed + notarized .dmg
            if [ "$GUI" = "true" ] && [ "${{ runner.os }}" = "macOS" ]; then
              if [ "${MACOS_SIGNED:-0}" != "1" ]; then
                echo "::warning::skipping ${NAME} DMG — no signing identity"
                continue
              fi
              APP_NAME="$APP_NAME" \
              BIN_NAME="$NAME" \
              PROJECT_DIR="$NAME" \
              TARGET_TRIPLE="${{ matrix.target }}" \
              VERSION="$VERSION" \
              OUT_DIR="$(pwd)/release" \
                bash .github/scripts/macos-bundle.sh
              continue
            fi

            (
              cd "${NAME}/target/${{ matrix.target }}/release"
              if [ "${{ runner.os }}" = "Windows" ]; then
                7z a "../../../../release/${NAME}-${{ matrix.target }}.zip" "${NAME}.exe"
              else
                tar czf "../../../../release/${NAME}-${{ matrix.target }}.tar.gz" "${NAME}"
              fi
            )
          done

          ls -lh release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: release/*
          if-no-files-found: ignore
          retention-days: 7

  # ╔══════════════════════════════════════════════════════════════════╗
  # ║ Job 3 — Create per-project GitHub Releases                       ║
  # ╚══════════════════════════════════════════════════════════════════╝
  release:
    name: Create Releases
    needs: [ detect, build ]
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p flat
          find artifacts -type f -exec cp {} flat/ \; 2>/dev/null || true
          ls -lh flat/

      - name: Create per-project releases
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          PROJECTS: ${{ needs.detect.outputs.projects }}
        run: |
          set -euo pipefail
          RELEASED='[]'

          for item in $(echo "$PROJECTS" | jq -c '.[]'); do
            NAME=$(echo "$item" | jq -r '.name')
            VERSION=$(echo "$item" | jq -r '.version')
            DESC=$(echo "$item" | jq -r '.description')
            TAG="${NAME}-v${VERSION}"

            echo ""; echo "━━━ Release: ${TAG} ━━━"

            mkdir -p "pkg-${NAME}"
            cp flat/${NAME}-*.tar.gz "pkg-${NAME}/" 2>/dev/null || true
            cp flat/${NAME}-*.zip    "pkg-${NAME}/" 2>/dev/null || true
            cp flat/${NAME}-*.dmg    "pkg-${NAME}/" 2>/dev/null || true

            ASSETS=$(ls "pkg-${NAME}/" 2>/dev/null | wc -l)
            if [ "$ASSETS" -eq 0 ]; then
              echo "  ⚠ No artifacts for ${NAME}, skip release"
              continue
            fi

            (cd "pkg-${NAME}" && sha256sum * > SHA256SUMS)

            INSTALL_CMD="curl -fsSL https://${R2_PUBLIC_DOMAIN}/${R2_KEY_PREFIX}/${NAME}/install.sh | bash"

            {
              echo "## ${NAME} v${VERSION}"
              echo ""
              echo "${DESC}"
              echo ""
              echo "### Install"
              echo ""
              echo '```bash'
              echo "${INSTALL_CMD}"
              echo '```'
              echo ""
              echo "Or download a tarball directly:"
              echo ""
              echo '```bash'
              echo "gh release download ${TAG} -p '${NAME}-*' -R ${GITHUB_REPO}"
              echo '```'
              echo ""
              echo "### Assets"
              echo ""
              for f in pkg-${NAME}/${NAME}-*.tar.gz pkg-${NAME}/${NAME}-*.zip pkg-${NAME}/${NAME}-*.dmg; do
                [ -f "$f" ] || continue
                base=$(basename "$f")
                size=$(stat -c%s "$f")
                sha=$(sha256sum "$f" | cut -d' ' -f1)
                printf -- "- \`%s\`  —  %s bytes  —  \`%s\`\n" "$base" "$size" "$sha"
              done
              echo ""
              echo "Built by GitHub Actions run #${{ github.run_number }} (commit ${GITHUB_SHA::7})"
            } > "pkg-${NAME}/RELEASE_NOTES.md"

            gh release create "$TAG" pkg-${NAME}/${NAME}-* pkg-${NAME}/SHA256SUMS \
              --title "${NAME} v${VERSION}" \
              --notes-file "pkg-${NAME}/RELEASE_NOTES.md"

            echo "  ✓ ${TAG} created with ${ASSETS} assets"
            RELEASED=$(echo "$RELEASED" | jq -c \
              --arg n "$NAME" --arg v "$VERSION" --arg t "$TAG" \
              '. + [{"name":$n,"version":$v,"tag":$t}]')
          done

          echo "released=$(echo "$RELEASED" | jq -c)" >> "$GITHUB_OUTPUT"

      - name: Upload pkg-* dirs for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: release-pkgs
          path: pkg-*
          retention-days: 7

  # ╔══════════════════════════════════════════════════════════════════╗
  # ║ Job 4 — Publish to R2 + HFrog (single-tool, in parallel)         ║
  # ║                                                                  ║
  # ║ Both R2 mirroring and the HFrog 4-API sync (software / platform  ║
  # ║ / version / release) live in scripts/hfrog_publisher.py — the    ║
  # ║ same script all ci-all-in-one Jenkins pipelines now invoke. So    ║
  # ║ "complete fields" here is identical to "complete fields" there.   ║
  # ╚══════════════════════════════════════════════════════════════════╝
  publish:
    name: Publish ${{ matrix.tool.name }} v${{ matrix.tool.version }}
    needs: [ detect, release ]
    if: ${{ needs.release.outputs.released != '' && needs.release.outputs.released != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: ${{ fromJson(needs.detect.outputs.projects) }}
    env:
      R2_ENDPOINT:           ${{ secrets.R2_ENDPOINT }}
      R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET:             ${{ secrets.R2_BUCKET }}
      HFROG_API:             https://hfrog.gamesci-lite.com
      # Optional — wire these to enable category_id / readme_url / llms_txt
      # SQL patch. Without them publisher still pushes the 4 hfrog APIs.
      HFROG_PG_URL: ${{ secrets.POSTGRES_HFROG_HOST != '' && format('postgresql://{0}:{1}@{2}:{3}/{4}', secrets.POSTGRES_HFROG_USER, secrets.POSTGRES_HFROG_PASSWORD, secrets.POSTGRES_HFROG_HOST, secrets.POSTGRES_HFROG_PORT, secrets.POSTGRES_HFROG_DB) || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Download release-pkgs artifact
        uses: actions/download-artifact@v4
        with:
          name: release-pkgs
          path: .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install publisher deps
        run: pip install boto3 psycopg2-binary

      - name: Build --asset args (one per actually-produced binary)
        id: assets
        env:
          TOOL: ${{ toJson(matrix.tool) }}
        run: |
          set -euo pipefail
          NAME=$(echo "$TOOL" | jq -r '.name')
          VERSION=$(echo "$TOOL" | jq -r '.version')
          GUI=$(echo "$TOOL" | jq -r '.gui')

          # GUI on macOS ships dmg, others ship tar.gz / zip.  Walk
          # pkg-<name>/ to find what the build job actually produced;
          # this also covers the case where MACOS_CERTIFICATE wasn't set
          # and a target was silently skipped.
          ASSET_ARGS=""
          for f in pkg-${NAME}/${NAME}-*.tar.gz pkg-${NAME}/${NAME}-*.zip pkg-${NAME}/${NAME}-*.dmg; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            triple=$(echo "$base" | sed -E "s/^${NAME}-//; s/\\.(tar\\.gz|zip|dmg)\$//")
            ASSET_ARGS="${ASSET_ARGS} --asset ${triple}=${f}"
          done
          [ -n "$ASSET_ARGS" ] || { echo "::error::no assets for ${NAME}, abort"; exit 1; }
          {
            echo "asset_args<<EOF"
            echo "${ASSET_ARGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish via hfrog_publisher.py
        env:
          TOOL_JSON: ${{ toJson(matrix.tool) }}
          ASSET_ARGS: ${{ steps.assets.outputs.asset_args }}
        run: |
          set -euo pipefail
          NAME=$(echo "$TOOL_JSON"        | jq -r '.name')
          VERSION=$(echo "$TOOL_JSON"     | jq -r '.version')
          DESC=$(echo "$TOOL_JSON"        | jq -r '.description')
          CATEGORY=$(echo "$TOOL_JSON"    | jq -r '.category')
          SOURCE_TYPE=$(echo "$TOOL_JSON" | jq -r '.source_type')

          NOTES_FILE="pkg-${NAME}/RELEASE_NOTES.md"
          [ -f "$NOTES_FILE" ] || NOTES_FILE=/dev/null

          INSTALL_URL="https://${R2_PUBLIC_DOMAIN}/${R2_KEY_PREFIX}/${NAME}/install.sh"

          python3 scripts/hfrog_publisher.py publish \
            --tool "$NAME" --version "$VERSION" \
            $ASSET_ARGS \
            --description "$DESC" \
            --category    "$CATEGORY" \
            --source-type "$SOURCE_TYPE" \
            --install-command    "curl -fsSL ${INSTALL_URL} | bash" \
            --install-script-url "${INSTALL_URL}" \
            --readme-url   "https://github.com/${GITHUB_REPO}/blob/main/${NAME}/README.md" \
            --llms-txt-url "https://raw.githubusercontent.com/${GITHUB_REPO}/main/${NAME}/llms.txt" \
            --r2-prefix          "${R2_KEY_PREFIX}/${NAME}" \
            --r2-public-domain   "${R2_PUBLIC_DOMAIN}" \
            --upload-r2 \
            --install-template   scripts/install.sh.template \
            --github-repo        "${GITHUB_REPO}" \
            --download-url-template "https://github.com/${GITHUB_REPO}/releases/download/${NAME}-v{version_no_v}/{filename}" \
            --release-notes "$(cat "$NOTES_FILE" 2>/dev/null || echo "${NAME} v${VERSION}")" \
            --created-by "github-actions/${{ github.run_number }}"
