# pgpour multi-kafka configuration example
#
# Single replication slot → CDC events routed to MULTIPLE independent Kafka clusters.
# Each target specifies its own brokers and auth — no shared kafka.brokers needed.
#
# Two patterns are supported:
#   1. Fully decoupled: omit kafka.brokers, each target self-contained (shown below)
#   2. Shared defaults: set kafka.brokers + auth, targets that share a cluster inherit them

postgres:
  host: db.example.com
  port: 5432
  database: mydb
  username: repl_user
  # password: (use PG_PASSWORD env var)
  publication: cdc_publication

kafka:
  # No shared brokers — each target independently defines its own cluster connection.

  targets:
    # ── Cluster A: internal plaintext ───────────────────────────
    - name: cluster-a
      brokers: kafka-a1:9092,kafka-a2:9092
      security_protocol: plaintext
      topic_prefix: cdc.cluster-a
      tables:
        - public.orders
        - public.payments

    # ── Cluster B: internal plaintext (different brokers) ───────
    - name: cluster-b
      brokers: kafka-b1:9092,kafka-b2:9092,kafka-b3:9092
      security_protocol: plaintext
      topic_prefix: cdc.cluster-b
      tables:
        - public.orders
        - public.user_events

    # ── Cluster C: production with SASL_SSL auth ────────────────
    - name: cluster-c-prod
      brokers: kafka-prod.example.com:9094
      security_protocol: sasl_ssl
      sasl_mechanism: scram-sha-512
      sasl_username: pgpour_producer
      # sasl_password: (use env or vault)
      ssl_ca_location: /etc/pgpour/ca-prod.pem
      topic_prefix: prod.analytics
      tables:
        - public.user_events
        - public.analytics_log

    # ── Cluster A again, different prefix, all tables ───────────
    - name: cluster-a-full
      brokers: kafka-a1:9092,kafka-a2:9092
      security_protocol: plaintext
      topic_prefix: cdc.cluster-a.full

pipeline:
  batch_max_fill_ms: 5000
  max_table_sync_workers: 4
