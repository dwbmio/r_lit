name: Release

on:
  push:
    branches: [ main ]
    paths:
      - '**/Cargo.toml'
  workflow_dispatch:
    inputs:
      projects:
        description: 'Space-separated project names to build (e.g. "bulk_upload img_resize")'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  HFROG_API: https://hfrog.gamesci-lite.com
  NEXUS_PUBLIC_URL: https://nexus.gamesci-lite.com
  NEXUS_REPO: raw-prod
  GITHUB_REPO: dwbmio/r_lit

jobs:
  # ╔══════════════════════════════════════════════╗
  # ║ Job 1: Detect version changes, build matrix  ║
  # ╚══════════════════════════════════════════════╝
  detect:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.detect.outputs.projects }}
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version changes
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # GUI projects ship a notarized .dmg from macOS-latest in addition
          # to the usual tar.gz; everything else stays binary-only.
          GUI_PROJECTS=(maquette group_vibe_workbench)

          is_gui() {
            local n=$1
            for g in "${GUI_PROJECTS[@]}"; do [ "$g" = "$n" ] && return 0; done
            return 1
          }

          PROJECTS="[]"

          add_project() {
            local name=$1 version=$2 gui="false"
            is_gui "$name" && gui="true"
            PROJECTS=$(echo "$PROJECTS" | jq -c \
              --arg n "$name" --arg v "$version" --argjson g "$gui" \
              '. + [{"name":$n,"version":$v,"gui":$g}]')
            echo "  + ${name} v${version} (gui=${gui})"
          }

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "=== Manual dispatch ==="
            for p in ${{ github.event.inputs.projects }}; do
              if [ ! -f "${p}/Cargo.toml" ]; then
                echo "  ✗ ${p}/Cargo.toml not found, skipping"
                continue
              fi
              VER=$(grep '^version' "${p}/Cargo.toml" | head -1 | cut -d'"' -f2)
              if gh release view "${p}-v${VER}" --json tagName >/dev/null 2>&1; then
                echo "  ≡ ${p}-v${VER} already released, skipping"
              else
                add_project "$p" "$VER"
              fi
            done
          else
            echo "=== Checking version diffs (HEAD vs HEAD^) ==="
            for dir in bulk_upload img_resize omniplan_covers_ding group_vibe_workbench maquette; do
              [ -f "${dir}/Cargo.toml" ] || continue
              NEW_VER=$(grep '^version' "${dir}/Cargo.toml" | head -1 | cut -d'"' -f2)
              OLD_VER=$(git show HEAD^:"${dir}/Cargo.toml" 2>/dev/null | grep '^version' | head -1 | cut -d'"' -f2 || echo "")
              if [ "$NEW_VER" != "$OLD_VER" ]; then
                if gh release view "${dir}-v${NEW_VER}" --json tagName >/dev/null 2>&1; then
                  echo "  ≡ ${dir} ${OLD_VER}→${NEW_VER} but ${dir}-v${NEW_VER} already released"
                else
                  echo "  Δ ${dir} ${OLD_VER}→${NEW_VER}"
                  add_project "$dir" "$NEW_VER"
                fi
              else
                echo "  · ${dir} v${NEW_VER} (unchanged)"
              fi
            done
          fi

          COUNT=$(echo "$PROJECTS" | jq 'length')
          echo ""
          echo "=== Result: ${COUNT} project(s) to build ==="
          echo "$PROJECTS" | jq .

          if [ "$COUNT" -eq 0 ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo 'projects=[]' >> $GITHUB_OUTPUT
            echo 'matrix={"include":[]}' >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "projects=$(echo "$PROJECTS" | jq -c)" >> $GITHUB_OUTPUT

          MATRIX='{"include":[
            {"os":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","use_cross":false},
            {"os":"ubuntu-latest","target":"x86_64-unknown-linux-musl","use_cross":false},
            {"os":"ubuntu-latest","target":"i686-unknown-linux-musl","use_cross":true},
            {"os":"ubuntu-latest","target":"aarch64-unknown-linux-musl","use_cross":true},
            {"os":"macos-latest","target":"x86_64-apple-darwin","use_cross":false},
            {"os":"macos-latest","target":"aarch64-apple-darwin","use_cross":false},
            {"os":"windows-latest","target":"x86_64-pc-windows-msvc","use_cross":false},
            {"os":"windows-latest","target":"i686-pc-windows-msvc","use_cross":false}
          ]}'

          echo "matrix=$(echo "$MATRIX" | jq -c)" >> $GITHUB_OUTPUT

  # ╔══════════════════════════════════════════════╗
  # ║ Job 2: Build changed binaries                ║
  # ╚══════════════════════════════════════════════╝
  build:
    name: Build (${{ matrix.target }})
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build dependencies (Linux)
        if: matrix.os == 'ubuntu-latest' && !matrix.use_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev cmake pkg-config libcurl4-openssl-dev

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-all-crates: true

      # ── macOS-only: import the Developer ID cert into a transient
      #               keychain so codesign can find it later. Skipped if
      #               MACOS_CERTIFICATE secret is not set, in which case
      #               GUI bundles will be unsigned (still useful for PRs).
      - name: Import codesign identity (macOS)
        if: matrix.os == 'macos-latest'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${MACOS_CERTIFICATE:-}" ]; then
            echo "::warning::MACOS_CERTIFICATE not set — GUI builds will be unsigned"
            echo "MACOS_SIGNED=0" >> "$GITHUB_ENV"
            exit 0
          fi
          KP="${KEYCHAIN_PASSWORD:-r_lit-temp-keychain-pwd}"
          KC="${RUNNER_TEMP}/build.keychain-db"
          security create-keychain -p "$KP" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KP" "$KC"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "${RUNNER_TEMP}/cert.p12"
          security import "${RUNNER_TEMP}/cert.p12" \
            -k "$KC" -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KP" "$KC"
          # Make our keychain the default search path.
          PRIOR=$(security list-keychains -d user | tr -d '" ' | tr '\n' ' ')
          security list-keychains -d user -s "$KC" $PRIOR
          rm -f "${RUNNER_TEMP}/cert.p12"
          echo "MACOS_SIGNED=1" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        env:
          PROJECTS: ${{ needs.detect.outputs.projects }}
        run: |
          for item in $(echo "$PROJECTS" | jq -c '.[]'); do
            NAME=$(echo "$item" | jq -r '.name')
            GUI=$(echo "$item" | jq -r '.gui')

            # GUI apps don't cross-compile cleanly to musl/cross targets
            # (Bevy/GPUI need system libs that aren't in the cross images).
            # Restrict them to native macOS + native Windows + native glibc.
            if [ "$GUI" = "true" ]; then
              case "${{ matrix.target }}" in
                x86_64-apple-darwin|aarch64-apple-darwin|x86_64-pc-windows-msvc) ;;
                *)
                  echo "⤳ skipping $NAME on ${{ matrix.target }} (GUI; not supported)"
                  continue
                  ;;
              esac
            fi

            echo "🔨 Building $NAME for ${{ matrix.target }}..."
            cd "$NAME"

            if [ "${{ matrix.use_cross }}" == "true" ]; then
              cross build --release --target ${{ matrix.target }}
            elif [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
              RUSTFLAGS='-C target-feature=+crt-static' cargo build --release --target ${{ matrix.target }}
            else
              cargo build --release --target ${{ matrix.target }}
            fi

            cd ..
          done

      - name: Package
        shell: bash
        env:
          PROJECTS: ${{ needs.detect.outputs.projects }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_PWD: ${{ secrets.MACOS_NOTARY_PWD }}
        run: |
          mkdir -p release

          for item in $(echo "$PROJECTS" | jq -c '.[]'); do
            NAME=$(echo "$item" | jq -r '.name')
            VERSION=$(echo "$item" | jq -r '.version')
            GUI=$(echo "$item" | jq -r '.gui')

            BIN_PATH="${NAME}/target/${{ matrix.target }}/release/${NAME}"
            BIN_PATH_EXE="${BIN_PATH}.exe"
            [ -f "$BIN_PATH" ] || [ -f "$BIN_PATH_EXE" ] || {
              echo "⤳ no artifact for ${NAME} on ${{ matrix.target }}, skip packaging"
              continue
            }

            # GUI on macOS → signed + notarized .dmg (no tar.gz dup)
            if [ "$GUI" = "true" ] && [ "${{ matrix.os }}" = "macos-latest" ]; then
              if [ "${MACOS_SIGNED:-0}" != "1" ]; then
                echo "::warning::skipping ${NAME} DMG — no signing identity"
                continue
              fi
              case "$NAME" in
                maquette)              APP_NAME="Maquette" ;;
                group_vibe_workbench)  APP_NAME="Group Vibe Workbench" ;;
                *)                     APP_NAME="$NAME" ;;
              esac
              APP_NAME="$APP_NAME" \
              BIN_NAME="$NAME" \
              PROJECT_DIR="$NAME" \
              TARGET_TRIPLE="${{ matrix.target }}" \
              VERSION="$VERSION" \
              OUT_DIR="$(pwd)/release" \
                bash .github/scripts/macos-bundle.sh
              continue
            fi

            cd "${NAME}/target/${{ matrix.target }}/release"
            if [ "${{ matrix.os }}" == "windows-latest" ]; then
              7z a "../../../../release/${NAME}-${{ matrix.target }}.zip" "${NAME}.exe"
            else
              tar czf "../../../../release/${NAME}-${{ matrix.target }}.tar.gz" "${NAME}"
            fi
            cd ../../../..
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: release/*
          if-no-files-found: ignore
          retention-days: 7

  # ╔══════════════════════════════════════════════╗
  # ║ Job 3: Create per-project GitHub Releases    ║
  # ╚══════════════════════════════════════════════╝
  release:
    name: Create Releases
    needs: [ detect, build ]
    if: success()
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p flat
          find artifacts -type f -exec cp {} flat/ \; 2>/dev/null || true
          ls -lh flat/

      - name: Create per-project releases
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          PROJECTS: ${{ needs.detect.outputs.projects }}
        run: |
          RELEASED="[]"

          for item in $(echo "$PROJECTS" | jq -c '.[]'); do
            NAME=$(echo "$item" | jq -r '.name')
            VERSION=$(echo "$item" | jq -r '.version')
            TAG="${NAME}-v${VERSION}"

            echo ""
            echo "━━━ Creating release: ${TAG} ━━━"

            # Collect this project's assets
            mkdir -p "pkg-${NAME}"
            cp flat/${NAME}-*.tar.gz "pkg-${NAME}/" 2>/dev/null || true
            cp flat/${NAME}-*.zip "pkg-${NAME}/" 2>/dev/null || true
            cp flat/${NAME}-*.dmg "pkg-${NAME}/" 2>/dev/null || true

            ASSET_COUNT=$(ls "pkg-${NAME}/" 2>/dev/null | wc -l)
            if [ "$ASSET_COUNT" -eq 0 ]; then
              echo "  ⚠ No artifacts for ${NAME}, skipping release"
              continue
            fi

            # Generate checksums
            cd "pkg-${NAME}"
            sha256sum * > SHA256SUMS
            cd ..

            # Build release notes
            NOTES="${NAME} v${VERSION}"$'\n\n'"Platforms:"$'\n'
            for f in pkg-${NAME}/${NAME}-*.tar.gz pkg-${NAME}/${NAME}-*.zip pkg-${NAME}/${NAME}-*.dmg; do
              [ -f "$f" ] || continue
              BASE=$(basename "$f")
              PLAT=$(echo "$BASE" | sed "s/^${NAME}-//" | sed 's/\.tar\.gz$//' | sed 's/\.zip$//' | sed 's/\.dmg$//')
              NOTES="${NOTES}- ${PLAT}"$'\n'
            done
            NOTES="${NOTES}"$'\n'"Install: gh release download ${TAG} -p '${NAME}-*' -R ${{ env.GITHUB_REPO }}"
            NOTES="${NOTES}"$'\n\n'"Built by GitHub Actions run #${{ github.run_number }}"

            # Create GitHub release
            gh release create "$TAG" pkg-${NAME}/* \
              --title "${NAME} v${VERSION}" \
              --notes "$NOTES"

            echo "  ✓ Release ${TAG} created with ${ASSET_COUNT} assets"
            RELEASED=$(echo "$RELEASED" | jq -c --arg n "$NAME" --arg v "$VERSION" --arg t "$TAG" \
              '. + [{"name":$n,"version":$v,"tag":$t}]')
          done

          echo "released=$(echo "$RELEASED" | jq -c)" >> $GITHUB_OUTPUT

  # ╔══════════════════════════════════════════════╗
  # ║ Job 4: Sync to HFrog (Release Tracking)      ║
  # ╚══════════════════════════════════════════════╝
  sync-hfrog:
    name: Sync to HFrog
    needs: release
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Sync releases to HFrog
        env:
          RELEASED: ${{ needs.release.outputs.released }}
        run: |
          HFROG="${{ env.HFROG_API }}"

          declare -A TOOL_DESC=(
            [img_resize]="图片批量缩放/压缩工具"
            [bulk_upload]="批量下载上传工具"
            [omniplan_covers_ding]="OmniPlan 封面生成工具"
            [group_vibe_workbench]="桌面协作工作台"
            [maquette]="Kit-based low-poly 建模与导出工具"
          )

          # GUI projects ship as a signed/notarized .dmg on macOS,
          # and only build for native Linux/Windows targets (no musl).
          declare -A GUI_TOOLS=(
            [maquette]=1
            [group_vibe_workbench]=1
          )

          PLATFORMS=(
            "x86_64-unknown-linux-gnu|linux|x86_64|Linux x86_64"
            "x86_64-unknown-linux-musl|linux|x86_64|Linux x86_64 (musl)"
            "i686-unknown-linux-musl|linux|i686|Linux i686 (musl)"
            "aarch64-unknown-linux-musl|linux|aarch64|Linux ARM64 (musl)"
            "x86_64-apple-darwin|macos|x86_64|macOS Intel"
            "aarch64-apple-darwin|macos|aarch64|macOS ARM64 (Apple Silicon)"
            "x86_64-pc-windows-msvc|windows|x86_64|Windows x86_64"
            "i686-pc-windows-msvc|windows|i686|Windows i686"
          )

          hfrog_post() {
            local endpoint=$1 data=$2
            local resp code body
            resp=$(curl -sS -w "\n%{http_code}" -X POST "${HFROG}${endpoint}" \
              -H 'Content-Type: application/json' -d "$data" 2>&1)
            code=$(echo "$resp" | tail -1)
            body=$(echo "$resp" | head -n -1)
            if [[ "$code" =~ ^2 ]] || echo "$body" | grep -qi "exist"; then
              echo "  ✓ ${endpoint} (${code})"
            else
              echo "  ✗ ${endpoint} (${code}): ${body}"
            fi
          }

          echo "$RELEASED" | jq -c '.[]' | while read -r item; do
            NAME=$(echo "$item" | jq -r '.name')
            VERSION=$(echo "$item" | jq -r '.version')
            TAG=$(echo "$item" | jq -r '.tag')
            DESC="${TOOL_DESC[$NAME]:-r_lit - ${NAME}}"
            GH_DL="https://github.com/${{ env.GITHUB_REPO }}/releases/download/${TAG}"

            echo ""
            echo "━━━ HFrog: ${NAME} v${VERSION} ━━━"

            # 1. Software
            hfrog_post "/api/release/softwares" \
              "{\"name\":\"${NAME}\",\"description\":\"${DESC}\",\"install_command\":\"gh release download ${TAG} -p '${NAME}-*' -R ${{ env.GITHUB_REPO }}\"}"

            # 2. Platforms
            for p in "${PLATFORMS[@]}"; do
              IFS='|' read -r code os arch display <<< "$p"
              hfrog_post "/api/release/platforms" \
                "{\"code\":\"${code}\",\"os\":\"${os}\",\"arch\":\"${arch}\",\"display_name\":\"${display}\"}"
            done

            # 3. Version
            hfrog_post "/api/release/versions" \
              "{\"software_name\":\"${NAME}\",\"version\":\"v${VERSION}\",\"is_latest\":true,\"release_notes\":\"Built by GitHub Actions\",\"created_by\":\"github-actions/${{ github.run_number }}\"}"

            # 4. Release records
            IS_GUI="${GUI_TOOLS[$NAME]:-0}"
            for p in "${PLATFORMS[@]}"; do
              IFS='|' read -r code os arch display <<< "$p"

              # GUI tools don't ship for musl-based Linux targets.
              if [[ "$IS_GUI" == "1" && "$code" == *-musl ]]; then
                continue
              fi

              if [[ "$os" == "windows" ]]; then
                DL_URL="${GH_DL}/${NAME}-${code}.zip"
              elif [[ "$IS_GUI" == "1" && "$os" == "macos" ]]; then
                DL_URL="${GH_DL}/${NAME}-${code}.dmg"
              else
                DL_URL="${GH_DL}/${NAME}-${code}.tar.gz"
              fi
              hfrog_post "/api/release/releases" \
                "{\"software_name\":\"${NAME}\",\"version\":\"v${VERSION}\",\"platform_code\":\"${code}\",\"download_url\":\"${DL_URL}\"}"
            done
          done

  # ╔══════════════════════════════════════════════╗
  # ║ Job 5: Mirror to Nexus (optional)            ║
  # ╚══════════════════════════════════════════════╝
  mirror-nexus:
    name: Mirror to Nexus
    needs: release
    if: success() && vars.ENABLE_NEXUS_MIRROR == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to Nexus
        env:
          NEXUS_USER: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASS: ${{ secrets.NEXUS_PASSWORD }}
          RELEASED: ${{ needs.release.outputs.released }}
        run: |
          mkdir -p flat
          find artifacts -type f -exec cp {} flat/ \; 2>/dev/null || true

          echo "$RELEASED" | jq -c '.[]' | while read -r item; do
            NAME=$(echo "$item" | jq -r '.name')
            VERSION=$(echo "$item" | jq -r '.version')
            NEXUS_PATH="r_lit/${NAME}"

            echo "=== ${NAME} v${VERSION} → Nexus ==="
            for f in flat/${NAME}-*.tar.gz; do
              [ -f "$f" ] || continue
              BASENAME=$(basename "$f")
              PLATFORM=$(echo "$BASENAME" | sed "s/^${NAME}-//" | sed 's/\.tar\.gz$//')

              tar xzf "$f" -C /tmp/ 2>/dev/null
              gzip -9 -f "/tmp/${NAME}"

              for dest in "v${VERSION}" "latest"; do
                curl -f --max-time 120 -u "${NEXUS_USER}:${NEXUS_PASS}" \
                  --upload-file "/tmp/${NAME}.gz" \
                  "${{ env.NEXUS_PUBLIC_URL }}/repository/${{ env.NEXUS_REPO }}/${NEXUS_PATH}/${dest}/${PLATFORM}/${NAME}.gz" \
                  && echo "  ✓ ${dest}/${PLATFORM}" \
                  || echo "  ✗ ${dest}/${PLATFORM}"
              done
              rm -f "/tmp/${NAME}" "/tmp/${NAME}.gz"
            done
          done

